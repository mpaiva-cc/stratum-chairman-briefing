title: Stratum
description: An AI-native human capital platform.
# GitHub Pages serves this repo at the subpath /stratum/.
# Repo renamed from stratum-chairman-briefing → stratum on 2026-05-19.
# Set both url + baseurl so Jekyll's `relative_url` / `absolute_url` filters
# emit working paths in production. Local dev should override with
# `jekyll serve --baseurl ""` (the Makefile's `serve` target does that).
# Note: stratum.ai is a different company; not our domain.
url: https://mpaiva-cc.github.io
baseurl: /stratum

# Keep public URLs identical to pre-Jekyll: every page already declares
# its `permalink:` in front-matter, so this default only applies to any
# file that forgets to set one (none expected).
permalink: /:path:output_ext

# Speed up GH Pages builds and keep agent artifacts out of _site/.
exclude:
  - agent-outbox/
  - scripts/
  - .claude/
  - .githooks/
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  # graph/mcp.md previously caused a build conflict (both .md and .html
  # wanted to write to /graph/mcp.html). Now /graph/mcp.html has explicit
  # front-matter with `permalink: /graph/mcp.html` and no layout-driven
  # markdown rendering — so the .md without front-matter copies as a
  # static file at /graph/mcp.md (the canonical-source link target).
  # NOTE: leaving NOT-excluded so links to /graph/mcp.md from the HTML
  # page resolve correctly.

keep_files:
  - assets

# Render Markdown if any sneaks in; HTML pages are untouched.
markdown: kramdown

plugins:
  - jekyll-sitemap
  - jekyll-feed

# Per-collection RSS (jekyll-feed). The default /feed.xml stays for posts
# (we have none). Each collection gets its own feed at the path below.
feed:
  collections:
    briefings:
      path: /briefings/feed.xml
    essays:
      path: /essays/feed.xml
    customers:
      path: /customers/feed.xml

# Collections — Phase 3. Items live in _<collection>/ directories. Output
# permalinks preserve the pre-migration URLs (/briefings/014.html etc.).
collections:
  briefings:
    output: true
    permalink: /briefings/:path:output_ext
  essays:
    output: true
    permalink: /essays/:path:output_ext
  customers:
    output: true
    permalink: /customers/:path:output_ext

# Migrated legacy pages bring their own complete <html>...</html>, so they
# need the pass-through `legacy` layout (not `default`, which wraps content
# in a new shell — that would nest two HTML documents).
# New pages (search, future indexes) override to `layout: default`.
defaults:
  - scope: { path: "" }
    values: { layout: legacy }
  - scope: { path: "", type: "briefings" }
    values: { layout: briefing }
  - scope: { path: "", type: "essays" }
    values: { layout: essay }
  - scope: { path: "", type: "customers" }
    values: { layout: legacy }
